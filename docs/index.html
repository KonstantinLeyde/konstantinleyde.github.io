<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstantin Leyde — Projects</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
    background: #0a0a0f;
    color: #e0e0e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 50px;
  }

  .header h1 {
    font-size: 2.4rem;
    font-weight: normal;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .header p {
    font-size: 1.1rem;
    color: #888;
    font-weight: normal;
    font-style: italic;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  .table-container {
    width: 100%;
    max-width: 750px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  thead th {
    text-align: left;
    padding: 16px 24px;
    font-size: 0.8rem;
    font-weight: normal;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(255, 255, 255, 0.02);
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  tbody tr {
    transition: background 0.2s ease;
    cursor: pointer;
  }

  tbody tr:hover {
    background: rgba(255, 255, 255, 0.05);
  }

  tbody tr:not(:last-child) td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  tbody td {
    padding: 18px 24px;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  .project-name {
    font-weight: normal;
    font-size: 1.05rem;
    color: #e0e0e8;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  .project-name .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .project-desc {
    font-size: 0.9rem;
    color: #777;
    font-weight: normal;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  .visit-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #60a5fa;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: normal;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid rgba(96, 165, 250, 0.2);
    transition: all 0.2s ease;
  }

  .visit-link:hover {
    background: rgba(96, 165, 250, 0.1);
    border-color: rgba(96, 165, 250, 0.4);
  }

  .visit-link svg {
    width: 14px;
    height: 14px;
    transition: transform 0.2s ease;
  }

  tbody tr:hover .visit-link svg {
    transform: translateX(2px);
  }

  .footer {
    margin-top: 40px;
    color: #444;
    font-size: 0.85rem;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  /* Color themes for icons */
  .bg-purple { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
  .bg-blue   { background: rgba(96, 165, 250, 0.15);  color: #60a5fa; }
  .bg-green  { background: rgba(52, 211, 153, 0.15);  color: #34d399; }
  .bg-amber  { background: rgba(251, 191, 36, 0.15);  color: #fbbf24; }
  .bg-rose   { background: rgba(251, 113, 133, 0.15); color: #fb7185; }
</style>
</head>
<body>

<div class="header">
  <h1>Konstantin Leyde</h1>
  <p>Projects & Websites</p>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Project</th>
        <th>Description</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="project-table">
    </tbody>
  </table>
</div>

<div class="footer">
  konstantinleyde.github.io
</div>

<script>
  // =====================================================
  // ✏️  EDIT THIS ARRAY TO ADD / REMOVE WEBSITES
  // =====================================================
  const projects = [
    {
      name: "GWTC-4 Catalog",
      description: "Gravitational-wave transient catalog browser",
      url: "https://konstantinleyde.github.io/website_gwtc_4_catalog/",
      icon: "🌌",
      color: "bg-purple"
    },
    {
      name: "Cholesky Decomposition",
      description: "Interactive visualization of Cholesky decomposition",
      url: "https://konstantinleyde.github.io/choleski-decomposition-visualization/",
      icon: "📐",
      color: "bg-blue"
    },
    // Add more like this:
    // {
    //   name: "My New Site",
    //   description: "A short description",
    //   url: "https://konstantinleyde.github.io/repo-name/",
    //   icon: "🚀",
    //   color: "bg-amber"
    // },
  ];

  const tbody = document.getElementById("project-table");

  projects.forEach(p => {
    const tr = document.createElement("tr");
    tr.onclick = () => window.open(p.url, "_blank");
    tr.innerHTML = `
      <td>
        <div class="project-name">
          <div class="icon ${p.color}">${p.icon}</div>
          ${p.name}
        </div>
      </td>
      <td class="project-desc">${p.description}</td>
      <td style="text-align:right">
        <a href="${p.url}" target="_blank" class="visit-link" onclick="event.stopPropagation()">
          Visit
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
          </svg>
        </a>
      </td>
    `;
    tbody.appendChild(tr);
  });
</script>
</body>
</html>
