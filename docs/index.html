<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstantin Leyde — Projects</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
    background: #f7f7f6;
    color: #1f2328;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 2.3rem;
    font-weight: normal;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
    color: #111;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 1.02rem;
    color: #666;
    font-weight: normal;
    font-style: italic;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  .bio {
    font-size: 1rem;
    color: #4b5563;
    font-weight: normal;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
    margin-top: 4px;
  }

  .bio-link {
    color: #111;
    text-decoration: none;
    border-bottom: 1px solid #b8bcc3;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .bio-link:hover {
    border-bottom-color: #111;
  }

  .accent-line {
    width: 56px;
    height: 1px;
    background: #d6d9df;
    border-radius: 2px;
    margin: 14px auto 0;
  }

  .columns {
    width: 100%;
    max-width: 980px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .panel {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    font-size: 0.95rem;
    color: #111;
    border-bottom: 1px solid #eceef1;
    background: #fff;
  }

  .panel-list {
    max-height: 360px;
    overflow-y: auto;
  }

  .project-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 62%);
    align-items: flex-start;
    column-gap: 12px;
    text-decoration: none;
    color: inherit;
    padding: 14px 22px;
    border-bottom: 1px solid #f0f1f3;
    transition: background 0.2s ease;
  }

  .project-row:last-child {
    border-bottom: none;
  }

  .project-row:hover {
    background: #f9fafb;
  }

  .project-desc {
    overflow: hidden;
    white-space: normal;
    line-height: 1.35;
    font-size: 0.9rem;
    color: #666;
    font-weight: normal;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
    text-align: right;
    opacity: 0;
    transform: translateX(12px);
    transition: opacity 0.24s ease, transform 0.28s ease;
    pointer-events: none;
  }

  .project-row:hover .project-desc {
    opacity: 1;
    transform: translateX(0);
  }

  .project-name {
    flex: 1 1 auto;
    min-width: 0;
    font-weight: normal;
    font-size: 1.14rem;
    color: #111;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

  @media (max-width: 820px) {
    .columns {
      grid-template-columns: 1fr;
    }
  }

  .footer {
    margin-top: 22px;
    color: #9aa1ac;
    font-size: 0.85rem;
    font-family: "Computer Modern Serif", "CMU Serif", "Latin Modern Roman", Georgia, serif;
  }

</style>
</head>
<body>

<div class="header">
  <h1>Konstantin Leyde</h1>
  <p class="bio">Flatiron Research Fellow at the <a href="https://www.simonsfoundation.org/people/konstantin-leyde/" target="_blank" class="bio-link">Center for Computational Astrophysics</a>, New York</p>
  <div class="accent-line"></div>
</div>

<div class="columns">
  <section class="panel">
    <div class="panel-header">Websites</div>
    <div id="websites-list" class="panel-list"></div>
  </section>

  <section class="panel">
    <div class="panel-header">Repositories</div>
    <div id="repos-list" class="panel-list"></div>
  </section>
</div>

<div class="footer">
  konstantinleyde.github.io
</div>

<script>
  // =====================================================
  // ✏️  EDIT THIS ARRAY TO ADD / REMOVE WEBSITES
  // =====================================================
  const websites = [
    {
      name: "GWTC-4 Catalog",
      description: "Gravitational-wave transient catalog browser",
      url: "https://konstantinleyde.github.io/website_gwtc_4_catalog/"
    },
    {
      name: "Cholesky Decomposition",
      description: "Interactive visualization of Cholesky decomposition",
      url: "https://konstantinleyde.github.io/choleski-decomposition-visualization/"
    },
  ];

  const repos = [
    {
      name: "light",
      description: "Bayesian reconstruction of the galaxy field for gravitational-wave cosmology",
      url: "https://github.com/KonstantinLeyde/light"
    },
  ];

  function populateList(listId, items) {
    const list = document.getElementById(listId);
    items.forEach(p => {
      const row = document.createElement("a");
      row.href = p.url;
      row.target = "_blank";
      row.className = "project-row";
      row.innerHTML = `
        <span class="project-name">${p.name}</span>
        <span class="project-desc">${p.description}</span>
      `;
      list.appendChild(row);
    });
  }

  populateList("websites-list", websites);
  populateList("repos-list", repos);
</script>
</body>
</html>
